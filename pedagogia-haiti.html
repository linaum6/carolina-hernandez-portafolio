<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trabajo con niños haitianos - Carolina Hernández</title>

<style>

body{
  font-family: Arial, sans-serif;
  margin:0;
  background:white;
}

header{
  padding:40px;
  text-align:center;
}

nav a{
  margin:15px;
  text-decoration:none;
  color:black;
  font-size:18px;
}

section{
  padding:60px;
  max-width:900px;
  margin:auto;
}

.galeria{
  display:grid;
  grid-template-columns: repeat(2, 1fr);
  gap:20px;
}

.galeria img{
  width:100%;
  height:300px;
  object-fit:cover;
  cursor:pointer;
}

/* VISOR */
.viewer{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.viewer img{
  max-width:70%;
  max-height:70%;
  transition: opacity 0.3s ease;
}

/* BOTONES */
.boton{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  font-size:40px;
  color:white;
  cursor:pointer;
  user-select:none;
  padding:20px;
}

.prev{ left:20px; }
.next{ right:20px; }

/* CONTADOR */
.contador{
  position:absolute;
  bottom:30px;
  color:white;
  font-size:18px;
}

/* CERRAR */
.cerrar{
  position:absolute;
  top:20px;
  right:30px;
  font-size:30px;
  color:white;
  cursor:pointer;
}

</style>

</head>

<body>

<header>

<h1>Carolina Hernández</h1>

<nav>
<a href="index.html">Inicio</a>
<a href="obras.html">Obras</a>
<a href="pedagogia.html">Pedagogía</a>
<a href="trayectoria.html">Trayectoria</a>
<a href="contacto.html">Contacto</a>
</nav>

</header>

<section>

<h2>Trabajo con niños haitianos</h2>

<div class="galeria">
  <img src="imagen25.JPG">
  <img src="imagen6.JPG">
  <img src="imagen24.JPG">
  <img src="imagen21.JPG">
</div>

</section>

<script>

const images = document.querySelectorAll('.galeria img');
let currentIndex = 0;

/* CREAR VISOR */
const viewer = document.createElement('div');
viewer.className = 'viewer';

const img = document.createElement('img');

const prev = document.createElement('div');
prev.className = 'boton prev';
prev.innerHTML = '←';

const next = document.createElement('div');
next.className = 'boton next';
next.innerHTML = '→';

const cerrar = document.createElement('div');
cerrar.className = 'cerrar';
cerrar.innerHTML = '✕';

const contador = document.createElement('div');
contador.className = 'contador';

viewer.appendChild(img);
viewer.appendChild(prev);
viewer.appendChild(next);
viewer.appendChild(cerrar);
viewer.appendChild(contador);

document.body.appendChild(viewer);

/* FUNCION MOSTRAR */
function mostrarImagen(index){
  img.style.opacity = 0;

  setTimeout(() => {
    img.src = images[index].src;
    contador.innerText = (index + 1) + " / " + images.length;
    img.style.opacity = 1;
  }, 150);
}

/* INICIO AUTOMATICO */
mostrarImagen(currentIndex);

/* BOTONES */
next.onclick = () => {
  currentIndex = (currentIndex + 1) % images.length;
  mostrarImagen(currentIndex);
};

prev.onclick = () => {
  currentIndex = (currentIndex - 1 + images.length) % images.length;
  mostrarImagen(currentIndex);
};

/* TECLADO */
document.addEventListener('keydown', (e) => {
  if(e.key === 'ArrowRight') next.onclick();
  if(e.key === 'ArrowLeft') prev.onclick();
  if(e.key === 'Escape') viewer.style.display = 'none';
});

/* CERRAR */
cerrar.onclick = () => viewer.style.display = 'none';
viewer.onclick = (e) => {
  if(e.target === viewer) viewer.style.display = 'none';
};

</script>

</body>
</html>
